name: Publish new Version
on:
  workflow_dispatch:

jobs:
  bump-version:
    if: github.repository == 'lukasbach/pensieve'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: 'paramsinghvc/gh-action-bump-version@master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: bump-version
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    strategy:
      matrix:
        include:
          - os: windows
            image: windows-latest
            arch: ""
          - os: macos
            image: macos-latest
            arch: arm64
          - os: macos
            image: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.image }}
    permissions:
      contents: write
      deployments: write
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: volta-cli/action@v4
      - run: yarn install
      - run: yarn lint
      - run: yarn run typecheck
      - run: yarn run build:docs
      - run: yarn make ${{ matrix.arch != '' && '--arch=' || '' }}${{ matrix.arch }}
      - run: yarn publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
